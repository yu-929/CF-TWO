name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "v1.0"
        type: string
      signed:
        description: "Code sign the IPA (requires APPLE_TEAM_ID secret)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "ios-v*"

permissions:
  contents: write

jobs:
  ios-ipa:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.4"
          cache-dependency-path: combined_refactor/go.sum

      - name: Set Version
        id: set-version
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Download CA Certificates
        run: |
          curl -fsSL --retry 3 --connect-timeout 10 \
            https://curl.se/ca/cacert.pem \
            -o combined_refactor/ca-certificates.crt

      - name: Build Go backend for iOS arm64
        working-directory: combined_refactor
        env:
          GOOS: ios
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.appVersion=${{ steps.set-version.outputs.VERSION }}" \
            -o ../ios/CFData-WEB/cfdata . 2>&1
          echo "Backend binary: $(file ../ios/CFData-WEB/cfdata)"
          echo "Size: $(du -h ../ios/CFData-WEB/cfdata | cut -f1)"

      - name: Generate Xcode project
        working-directory: ios
        run: |
          rm -rf CFData-WEB.xcodeproj
          ruby generate-project.rb
          ls -la CFData-WEB.xcodeproj/
          ls -la CFData-WEB.xcodeproj/project.pbxproj

      - name: Build archive
        id: build-archive
        working-directory: ios
        run: |
          set -o pipefail
          rm -rf build

          xcodebuild archive \
            -project CFData-WEB.xcodeproj \
            -scheme CFData-WEB \
            -configuration Release \
            -archivePath "$PWD/build/CFData-WEB.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 2>&1 | tee build.log

          echo "Exit code: $?"
          echo "Archive contents:"
          find build -type d -maxdepth 3 2>/dev/null || echo "build dir not found"

      - name: Debug build failure
        if: ${{ failure() || steps.build-archive.outcome == 'failure' }}
        working-directory: ios
        run: |
          echo "=== Build errors ==="
          grep -i "error:" build.log 2>/dev/null || echo "No error lines found"
          grep -i "fatal:" build.log 2>/dev/null || echo "No fatal lines found"
          grep -i "warning:" build.log 2>/dev/null | head -20 || echo "No warnings"
          echo "=== Last 50 lines ==="
          tail -50 build.log 2>/dev/null || echo "No build.log"
          echo "=== Build directory ==="
          find build -type f 2>/dev/null || echo "No build dir"
          echo "=== xcodebuild version ==="
          xcodebuild -version

      - name: Manually package IPA (unsigned)
        if: ${{ github.event.inputs.signed != 'true' && steps.build-archive.outcome == 'success' }}
        working-directory: ios
        run: |
          mkdir -p build/ipa

          APP_PATH=$(find build/CFData-WEB.xcarchive -name "*.app" -type d | head -1)
          echo "Found .app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d | head -1)
            echo "Fallback .app: $APP_PATH"
          fi

          if [ -n "$APP_PATH" ]; then
            mkdir -p build/ipa/Payload
            cp -r "$APP_PATH" build/ipa/Payload/
            cd build/ipa
            zip -r CFData-WEB.ipa Payload/
            rm -rf Payload
            cd ../..
            echo "IPA created: build/ipa/CFData-WEB.ipa"
            ls -la build/ipa/CFData-WEB.ipa
          else
            echo "ERROR: No .app bundle found"
            find build -type d -maxdepth 5 2>/dev/null
            exit 1
          fi

      - name: Export IPA (signed)
        if: ${{ github.event.inputs.signed == 'true' && steps.build-archive.outcome == 'success' }}
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/ipa

          cat > build/export-options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/CFData-WEB.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist build/export-options.plist \
            -allowProvisioningUpdates

          ls -la build/ipa/

      - name: Prepare artifacts
        run: |
          mkdir -p release_assets

          IPA_FILE=$(find ios/build/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -n "$IPA_FILE" ]; then
            cp "$IPA_FILE" "release_assets/CFData-WEB-ios-arm64.ipa"
            echo "IPA: $IPA_FILE"
          else
            echo "WARNING: No IPA file found"
          fi

          if [ -f ios/CFData-WEB/cfdata ]; then
            cp ios/CFData-WEB/cfdata release_assets/cfdata-ios-arm64
          fi

          ls -la release_assets/

      - name: Generate SHA256
        working-directory: release_assets
        run: |
          for file in $(find . -type f ! -name '*.sha256'); do
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          done

      - name: Upload build log
        if: ${{ failure() || steps.build-archive.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios/build.log
          retention-days: 7

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release_assets/*
          retention-days: 30